version: "3.9"

services:

  qdrant:
    image: qdrant/qdrant
    container_name: astramind-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  backend:
    build: .
    container_name: astramind-backend
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always